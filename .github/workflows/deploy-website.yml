name: Build & Deploy Website

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest
    permissions:
      contents: read
      deployments: write
    env:
      PYTHONUTF8: 1

    steps:
      # 1. Checkout Code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 3. Install Python Dependencies
      - name: Install Python dependencies
        run: |
          pip install python-frontmatter imagesize

      # 4. Install Pandoc (Required by build_web.py)
      - name: Install Pandoc
        run: choco install pandoc --no-progress

      # 5. Generate Svelte Pages from Markdown
      - name: Generate Svelte Pages
        run: python scripts/build_web.py

      # 6. Setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      # 7. Install NPM Dependencies
      - name: Install Node dependencies
        working-directory: ./website
        run: npm ci

      # 8. Build SvelteKit Site
      - name: Build Website
        working-directory: ./website
        run: npm run build

      # 9. Deploy to Cloudflare Pages
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: website
          command: pages deploy --project-name=gsgw
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}